# Generic Go Build Workflow
#
# A reusable workflow for building, testing Go projects with optional SonarQube analysis and Docker image creation.
#
# Usage:
#   jobs:
#     build:
#       uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@v2.x.x
#       with:
#         sonar-project-key: ${{ vars.SONAR_PROJECT_KEY }}
#         install-envtest: true  # for Kubernetes operators
#         go-module-configs: '[{"dir":".","cover-packages":"./controllers/...,./api/..."},{"dir":"cmd/etcd-certs-to-secret","cover-packages":"./..."}]'
#       secrets: inherit
#
# Features:
#   - Automatic go.mod discovery with multi-module mono-repo support
#   - Go tests with coverage
#   - SonarQube code quality and security scanning with aggregated coverage (optional)
#   - Envtest support for Kubernetes operators (optional)
#   - Automatic Docker image build (skipped if no config or for fork PRs)
#
# Required secrets (inherited):
#   - SONAR_TOKEN — for SonarQube analysis
#
# Required vars:
#   - SONAR_PROJECT_KEY, SONAR_ORGANIZATION, SONAR_HOST_URL

name: Generic Go build

on:
  workflow_call:
    inputs:
      # Go module configuration
      go-module-dir:
        description: 'Optional directory containing go.mod file. If not specified, will search for go.mod files in the repository.'
        required: false
        type: string
      go-module-dirs:
        description: 'Optional newline-separated list of directories containing go.mod files. Takes precedence over automatic discovery.'
        required: false
        type: string
      go-module-configs:
        description: 'Optional JSON array of module configs, for example [{"dir":".","cover-packages":"./controllers/...,./api/..."},{"dir":"cmd/etcd-certs-to-secret","cover-packages":"./..."}]. Takes precedence over go-module-dirs.'
        required: false
        type: string

      # Sonar configuration
      sonar-project-key:
        description: 'Sonar project key for analysis'
        required: false
        type: string

      # Envtest configuration (for Kubernetes operators)
      install-envtest:
        description: 'Install envtest dependencies'
        required: false
        type: boolean
        default: false

      envtest-version:
        description: 'Setup-envtest script version (auto-detected from controller-runtime if not specified)'
        required: false
        type: string
        default: ''

      kube-version:
        description: 'Kubernetes API version for envtest setup (e.g., "1.32.0")'
        required: false
        type: string
        default: '1.32.0'

      # Coverage configuration
      cover-packages:
        description: 'Packages to include in coverage report (default: all packages)'
        required: false
        type: string
        default: './...'

      # Git reference configuration
      ref:
        description: 'Git reference (branch, tag, or SHA) to checkout and build'
        required: false
        type: string

      # Docker build configuration
      dry-run:
        description: 'Run docker build in dry-run mode (no push)'
        required: false
        type: boolean
        default: false
      skip-docker:
        description: 'Skip Docker image build step'
        required: false
        type: boolean
        default: false
      docker-config-file:
        description: 'Path to docker config file inside .github folder'
        required: false
        type: string
        default: 'docker-dev-config.json'
    secrets:
      SONAR_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write
  packages: write

concurrency:
  group: go-${{ github.workflow_ref }}-${{ github.event_name }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover Go modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.discover.outputs.modules }}
      module-count: ${{ steps.discover.outputs.module_count }}
      first-module-dir: ${{ steps.discover.outputs.first_module_dir }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Discover go.mod files
        id: discover
        shell: bash
        run: |
          set -euo pipefail

          echo "::info:: Resolving Go module directories..."

          modules_json="[]"

          add_module() {
            local module_dir="$1"
            local module_cover_packages="${2:-${{ inputs.cover-packages }}}"
            local normalized_dir
            local module_file
            local module_name

            normalized_dir="${module_dir#./}"
            if [ -z "$normalized_dir" ]; then
              normalized_dir="."
            fi

            module_file="${normalized_dir}/go.mod"
            if [ "$normalized_dir" = "." ]; then
              module_file="go.mod"
            fi

            if [ ! -d "$normalized_dir" ]; then
              echo "::error:: Directory not found: ${normalized_dir}"
              exit 1
            fi

            if [ ! -f "$module_file" ]; then
              echo "::error:: go.mod file not found in directory: ${normalized_dir}"
              exit 1
            fi

            module_name=$(echo "$normalized_dir" | tr '/.' '__' | tr -cd '[:alnum:]_-')
            if [ -z "$module_name" ]; then
              module_name="root"
            fi

            modules_json=$(
              jq -c \
                --arg dir "$normalized_dir" \
                --arg name "$module_name" \
                --arg cover_packages "$module_cover_packages" \
                '. + [{"dir": $dir, "name": $name, "cover_packages": $cover_packages}]' \
                <<<"$modules_json"
            )
          }

          if [ -n "${{ inputs.go-module-configs }}" ]; then
            echo "::info:: Using go-module-configs input..."
            while IFS=$'\t' read -r module_dir module_cover_packages; do
              [ -z "$module_dir" ] && continue
              add_module "$module_dir" "$module_cover_packages"
            done < <(
              jq -r '
                if type != "array" then
                  error("go-module-configs must be a JSON array")
                else
                  .[]
                  | if (.dir // "") == "" then
                      error("Each go-module-configs entry must contain non-empty dir")
                    else
                      [ .dir, (.["cover-packages"] // "./...") ] | @tsv
                    end
                end
              ' <<< '${{ inputs.go-module-configs }}'
            )
          elif [ -n "${{ inputs.go-module-dirs }}" ]; then
            echo "::info:: Using go-module-dirs input..."
            while IFS= read -r module_dir; do
              module_dir="$(printf '%s' "$module_dir" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              [ -z "$module_dir" ] && continue
              add_module "$module_dir"
            done <<'EOF'
          ${{ inputs.go-module-dirs }}
          EOF
          elif [ -n "${{ inputs.go-module-dir }}" ]; then
            echo "::info:: Using go-module-dir input..."
            add_module "${{ inputs.go-module-dir }}"
          else
            echo "::info:: Searching for go.mod files..."
            while IFS= read -r module_file; do
              [ -z "$module_file" ] && continue
              add_module "$(dirname "${module_file}")"
            done < <(find . -path '*/vendor/*' -prune -o -name go.mod -print | sort)
          fi

          module_count=$(jq 'length' <<<"$modules_json")
          if [ "$module_count" -eq 0 ]; then
            echo "::error:: No go.mod files found in the repository"
            exit 1
          fi

          echo "::info:: Found ${module_count} Go module(s)"
          jq -r '.[] | "::info:: Module: \(.dir)"' <<<"$modules_json"

          {
            echo "modules=${modules_json}"
            echo "module_count=${module_count}"
            echo "first_module_dir=$(jq -r '.[0].dir' <<<"$modules_json")"
          } >> "$GITHUB_OUTPUT"

  test:
    name: Test ${{ matrix.module.dir }}
    needs: [discover]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: true
          cache-dependency-path: ${{ matrix.module.dir }}/go.sum
          go-version-file: ${{ matrix.module.dir }}/go.mod

      - name: Install envtest
        if: inputs.install-envtest == true
        working-directory: ${{ matrix.module.dir }}
        env:
          ENVTEST_VERSION: ${{ inputs.envtest-version }}
          KUBE_VERSION: ${{ inputs.kube-version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$ENVTEST_VERSION" ]; then
            echo "::info:: Trying to install setup-envtest@$ENVTEST_VERSION..."
            go install "sigs.k8s.io/controller-runtime/tools/setup-envtest@$ENVTEST_VERSION"
          else
            echo "::info:: No envtest-version specified, determining version from controller-runtime..."
            CR_VERSION=$(go list -m -f "{{ .Version }}" sigs.k8s.io/controller-runtime 2>/dev/null || echo "")
            if [ -z "$CR_VERSION" ]; then
              echo "::error:: Unable to determine controller-runtime version. Please specify envtest-version explicitly."
              exit 1
            else
              echo "::info:: Controller-runtime version: ${CR_VERSION}"
              if [[ "$CR_VERSION" =~ v([0-9]+)\.([0-9]+) ]]; then
                ENVTEST_VERSION="release-${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
                echo "::info:: Using envtest version: $ENVTEST_VERSION"
                go install "sigs.k8s.io/controller-runtime/tools/setup-envtest@$ENVTEST_VERSION"
              else
                echo "::warning:: Cannot parse controller-runtime version: $CR_VERSION. Please specify envtest-version explicitly."
                exit 1
              fi
            fi
          fi
          echo "::info:: Setting up envtest for Kubernetes $KUBE_VERSION..."
          SETUP_OUTPUT=$(setup-envtest use "$KUBE_VERSION" -p env 2>&1)
          echo "$SETUP_OUTPUT"
          ASSETS=$(echo "$SETUP_OUTPUT" | grep 'export KUBEBUILDER_ASSETS' | cut -d= -f2| tr -d "'\"")
          if [ -d "$ASSETS" ]; then
            echo "KUBEBUILDER_ASSETS=$ASSETS" >> $GITHUB_ENV
            echo "::info:: Successfully set KUBEBUILDER_ASSETS=$ASSETS"
          else
            echo "::error:: envtest assets directory not found."
            exit 1
          fi

      - name: Test with coverage
        working-directory: ${{ matrix.module.dir }}
        run: |
          echo "::info:: Running tests with coverage..."
          echo "::info:: Using cover packages: ${{ matrix.module.cover_packages }}"
          go test -v ./... -coverpkg="${{ matrix.module.cover_packages }}" -coverprofile coverage.out

      - name: Prepare coverage artifact
        if: inputs.sonar-project-key != ''
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .sonar
          cp "${{ matrix.module.dir }}/coverage.out" ".sonar/${{ matrix.module.name }}.coverage.out"

      - name: Upload coverage artifact
        if: inputs.sonar-project-key != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.module.name }}
          path: .sonar/${{ matrix.module.name }}.coverage.out
          if-no-files-found: error

  sonar:
    name: Sonar analysis
    if: inputs.sonar-project-key != ''
    needs: [discover, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          path: .sonar-artifacts
          pattern: coverage-*
          merge-multiple: true

      - name: Upload coverage report to SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          echo "::info:: Installing sonar-scanner..."
          npm install -g sonar-scanner@3.1.0 --ignore-scripts

          COVERAGE_PATHS=$(find .sonar-artifacts -name '*.coverage.out' | sort | paste -sd, -)
          if [ -z "$COVERAGE_PATHS" ]; then
            echo "::error:: No coverage artifacts found for Sonar analysis"
            exit 1
          fi

          if [ -f "sonar-project.properties" ]; then
            SONAR_SETTINGS_PATH="sonar-project.properties"
            SONAR_BASE_DIR="."
            echo "::info:: Using repository-level sonar-project.properties"
          elif [ "${{ needs.discover.outputs.module-count }}" = "1" ]; then
            MODULE_DIR="${{ needs.discover.outputs.first-module-dir }}"
            if [ -f "${MODULE_DIR}/sonar-project.properties" ]; then
              SONAR_SETTINGS_PATH="${MODULE_DIR}/sonar-project.properties"
              SONAR_BASE_DIR="${MODULE_DIR}"
              echo "::info:: Using module-level sonar-project.properties from ${MODULE_DIR}"
            else
              echo "::error:: sonar-project.properties not found in repository root or in single module ${MODULE_DIR}"
              exit 1
            fi
          else
            echo "::error:: For multi-module repositories sonar-project.properties must be placed in the repository root"
            exit 1
          fi

          echo "::info:: Running sonar-scanner with coverage files: ${COVERAGE_PATHS}"
          sonar-scanner \
            -Dproject.settings="${SONAR_SETTINGS_PATH}" \
            -Dsonar.projectBaseDir="${SONAR_BASE_DIR}" \
            -Dsonar.projectKey=${{ inputs.sonar-project-key }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.go.coverage.reportPaths="${COVERAGE_PATHS}"

  docker-build:
    name: Build Docker image
    needs: [test, sonar]
    # Skip docker build for PRs coming from forks or if skip-docker is true
    if: ${{ !inputs.skip-docker && !(github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork) && (inputs.sonar-project-key == '' || needs.sonar.result == 'success') }}
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@v2.4.1
    with:
      ref: ${{ inputs.ref }}
      dry-run: ${{ inputs.dry-run }}
      config-filename: ${{ inputs.docker-config-file }}
