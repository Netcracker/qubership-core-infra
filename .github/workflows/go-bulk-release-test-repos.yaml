# $schema: https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json

name: "Go bulk release test repos"
run-name: Go bulk release of test-repos [${{ inputs.repositoryToRelease }}] by @${{ github.actor }}'

on:
  workflow_dispatch:
    inputs:
      repositoryToRelease:
        type: choice
        description: "Repository to bulk release from. Select 'all' to release all repositories"
        options:
          - all
          - test-go-repo-A
          - test-go-repo-B
      skipTest:
        description: "skip tests"
        type: boolean
        default: false
      dryRun:
        description: "dry run"
        type: boolean
        default: false
      branch:
        description: "Branch to check out all repositories from. Leave empty to use main. When set, only patch version bumps are allowed."
        type: string
        default: ""
      ltsRelease:
        description: "Enable LTS release mode: create LTS branches and add technical commit to main. Requires repositoryToRelease=all."
        type: boolean
        default: false
      ltsBranchName:
        description: "LTS branch name to create, e.g. lts/26.2 (required when ltsRelease=true)"
        type: string
        default: ""

concurrency:
  group: "test-repos-go"
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      MAVEN_USER: "x-access-token"
      MAVEN_TOKEN: ${{ secrets.MAVEN_RELEASE_DEV_TOKEN }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.maven-gpg-passphrase }}
    outputs:
      result: ${{ steps.run-go-bulk-release-cli.outputs.result }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          ref: "main"

      - name: "Read repositories"
        id: read-repositories
        shell: bash
        # language="shell script"
        run: |
          repositories="https://github.com/TaurMorchant/test-go-repo-A
          https://github.com/TaurMorchant/test-go-repo-B"
          echo "repositories=\n${repositories}"
          repositories=$(echo "${repositories}" | tr '\n' ',')
          echo "repositories=${repositories}" >> "${GITHUB_OUTPUT}"

      - name: "Set up java"
        uses: actions/setup-java@v5
        with:
          java-version: 21
          architecture: 'x64'
          distribution: 'temurin'
          server-id: github
          server-username: MAVEN_USER
          server-password: MAVEN_TOKEN
          gpg-private-key: ${{ inputs.maven-gpg-private-key }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: "Install gomajor"
        run: |
          go install github.com/icholy/gomajor@v0.15.0

      - name: "Install go-pack"
        run: |
          go install github.com/taurmorchant/go-pack@v1.1.4

      - name: "Install go-semantic-release"
        run: |
          curl -SL https://github.com/go-semantic-release/semantic-release/releases/download/v2.31.0/semantic-release_v2.31.0_linux_amd64 -o ./semantic-release
          chmod +x ./semantic-release
          sudo mv semantic-release /usr/local/bin/semantic-release

      - name: "Run go-bulk-release-cli"
        id: run-go-bulk-release-cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.MAVEN_RELEASE_DEV_TOKEN }}
          REPOSITORIES: ${{ steps.read-repositories.outputs.repositories }}
          REPOSITORY_TO_RELEASE: ${{ inputs.repositoryToRelease }}
          SKIP_TEST: ${{ inputs.skipTest }}
          DRY_RUN: ${{ inputs.dryRun }}
          BRANCH: ${{ inputs.branch }}
          LTS_RELEASE: ${{ inputs.ltsRelease }}
          LTS_BRANCH_NAME: ${{ inputs.ltsBranchName }}
        # language="shell script"
        run: |
          mkdir /tmp/GOPROXY

          snapshotVersion="1.8.2-20260601.075455-13"

          url="https://maven.pkg.github.com/netcracker/qubership-core-bulk-release/org/qubership/cloud/go-bulk-release-cli/1.8.2-SNAPSHOT/go-bulk-release-cli-${snapshotVersion}-jar-with-dependencies.jar"
          curl --fail -L -o "go-bulk-release-cli.jar" -H "Authorization: Bearer ${MAVEN_TOKEN}" "${url}"

          options=""
          if [ "${SKIP_TEST}" = "true" ]; then
            options="${options} --skipTests"
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            options="${options} --dryRun"
          fi
          repositoryToRelease=""
          if [ "${REPOSITORY_TO_RELEASE}" = "all" ]; then
            repositoryToRelease=""
          else
            repositoryToRelease="https://github.com/TaurMorchant/${REPOSITORY_TO_RELEASE}"
          fi
          args="--baseDir=/tmp"
          args="${args} --goProxyDir=/tmp/GOPROXY"
          args="${args} --gitURL=https://github.com"
          args="${args} --gitUsername=actions"
          args="${args} --gitEmail=actions@github.com"
          args="${args} --gitPassword=${MAVEN_TOKEN}"
          args="${args} --repositories=${REPOSITORIES}"
          args="${args} --repositoriesToReleaseFrom=${repositoryToRelease}"
          args="${args} --resultOutputFile=${GITHUB_OUTPUT}"
          args="${args} --summaryFile=${GITHUB_STEP_SUMMARY}"
          args="${args} --gavsResultFile=/tmp/gavs.txt"
          args="${args} --dependencyGraphFile=/tmp/graph.dot"
          if [ -n "${BRANCH}" ]; then
            args="${args} --branch=${BRANCH}"
          fi
          if [ "${LTS_RELEASE}" = "true" ]; then
            args="${args} --ltsRelease"
            args="${args} --ltsBranchName=${LTS_BRANCH_NAME}"
          fi
          args="${args} ${options}"
          cmd="java -jar go-bulk-release-cli.jar ${args}"
          echo "running cmd: ${cmd}"
          eval "${cmd}"

      - name: "Upload gavs artifact"
        uses: actions/upload-artifact@v6
        with:
          name: gavs.txt
          path: /tmp/gavs.txt

      - name: "Upload graph artifact"
        uses: actions/upload-artifact@v6
        with:
          name: graph.dot
          path: /tmp/graph.dot
