name: LTS Versions Report

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate and deploy versions report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout infra (scripts)
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          path: infra

      - name: Clone Java repos
        env:
          TOKEN: ${{ secrets.MAVEN_RELEASE_DEV_TOKEN }}
        run: |
          for list in infra/lts-versions-script/java-libs-repos.txt infra/lts-versions-script/java-services-repos.txt; do
            while IFS= read -r repo || [ -n "$repo" ]; do
              [[ "$repo" =~ ^#|^[[:space:]]*$ ]] && continue
              name="${repo##*/}"
              git clone --quiet --filter=blob:none \
                "https://x-token-auth:$TOKEN@github.com/$repo.git" "$name"
              git -C "$name" fetch --all --prune --quiet
            done < "$list"
          done

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate HTML report
        env:
          GH_TOKEN: ${{ secrets.MAVEN_RELEASE_DEV_TOKEN }}
        run: |
          mkdir -p _site
          python3 infra/lts-versions-script/lts-versions.py _site/index.html \
            --java-libs-repos     infra/lts-versions-script/java-libs-repos.txt \
            --java-services-repos infra/lts-versions-script/java-services-repos.txt \
            --java-workspace      "$GITHUB_WORKSPACE" \
            --go-libs-repos       infra/lts-versions-script/go-libs-repos.txt \
            --go-services-repos   infra/lts-versions-script/go-services-repos.txt

      - name: Deploy to gh-pages (versions/ subpath, keep existing content)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '_site'
          destination_dir: 'lts-versions'
          keep_files: true
