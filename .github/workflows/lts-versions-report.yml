name: LTS Versions Report

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate-report:
    name: Generate and deploy versions report
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout infra (scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: infra

      - name: Checkout java-libs (full history, all branches)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: Netcracker/qubership-core-java-libs
          token: ${{ secrets.MAVEN_RELEASE_DEV_TOKEN }}
          fetch-depth: 0
          fetch-tags: false
          path: java-libs

      - name: Fetch all remote branches
        run: git -C java-libs fetch --all --prune

      - name: Install dependencies
        run: pip install jinja2

      - name: Generate HTML report
        run: |
          mkdir -p _site
          python3 infra/lts-versions-script/lts-versions.py _site/index.html --repo "$GITHUB_WORKSPACE/java-libs"

      - name: Deploy to gh-pages (versions/ subpath, keep existing content)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: '_site'
          destination_dir: 'lts-versions'
          keep_files: true
