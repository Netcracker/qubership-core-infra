# Maven Deploy Branch Snapshot Workflow (experimental)
#
# Reusable workflow. Implements branch-isolated SNAPSHOT versioning: before deploy,
# replaces all X.Y.Z-SNAPSHOT occurrences in every pom.xml with
# X.Y.Z-<branch>-SNAPSHOT, then runs mvn deploy. Changes are NOT committed —
# they exist only for the duration of the workflow run.
#
# This prevents branch artifacts from overwriting main or other branch artifacts
# in the repository.
#
# Prerequisites:
#   - All inter-module dependencies in main must use SNAPSHOT versions
#   - No 3rd-party dependencies may use SNAPSHOT versions
#
# Usage:
#   jobs:
#     deploy:
#       uses: Netcracker/qubership-core-infra/.github/workflows/maven-deploy-branch-snapshot.yml@main
#       with:
#         branch: 'feature/my-feature'
#       secrets: inherit

name: Maven deploy (branch snapshot)

run-name: Deploy branch snapshot [${{ inputs.branch }}]

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        type: string
      docker-config-file:
        description: 'Path to docker config file inside .github folder'
        required: false
        type: string
        default: 'docker-dev-config.json'
      skip-docker:
        description: 'Skip Docker image build'
        required: false
        type: boolean
        default: true
    secrets:
      MAVEN_GPG_PRIVATE_KEY:
        description: 'GPG private key'
        required: false
      MAVEN_GPG_PASSPHRASE:
        description: 'GPG passphrase'
        required: false

concurrency:
  group: maven-branch-snapshot-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  maven-deploy:
    name: Maven deploy (branch snapshot)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Prevent deploy from main
        if: ${{ inputs.branch == 'main' }}
        run: |
          echo "::error::This workflow is for feature branches only. Use the 'Maven deploy' workflow for main."
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Compute version suffix from branch name
        id: version
        run: |
          RAW="${{ inputs.branch }}"
          # Replace non-alphanumeric characters with dashes, collapse runs, trim ends, cap length
          SUFFIX=$(echo "$RAW" | sed 's/[^a-zA-Z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//' | cut -c1-50)
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "Branch '${RAW}' → version suffix '${SUFFIX}'"

      - name: Patch SNAPSHOT versions in pom.xml files
        run: |
          SUFFIX="${{ steps.version.outputs.suffix }}"
          find . -name "pom.xml" \
            -exec sed -i "s/\([0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*\)-SNAPSHOT/\1-${SUFFIX}-SNAPSHOT/g" {} +
          echo "Patched versions:"
          git diff --unified=0 -- '*/pom.xml' pom.xml \
            | grep '^[+-][^+-]' \
            | grep -o '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*[^<"]*SNAPSHOT[^<"]*' \
            | sort -u

      - name: Maven build
        uses: netcracker/qubership-workflow-hub/actions/maven-snapshot-deploy@v2.0.11
        with:
          java-version: "21"
          target-store: 'github'
          maven-command: 'deploy'
          upload-artifact: 'false'
          maven-username: ${{ github.actor }}
          maven-token: ${{ github.token }}
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  docker-build:
    name: Build Docker image
    needs: [maven-deploy]
    if: ${{ !inputs.skip-docker }}
    uses: Netcracker/qubership-core-infra/.github/workflows/docker-build.yaml@feat/consistent-snapshots
    with:
      ref: ${{ inputs.branch }}
      config-filename: ${{ inputs.docker-config-file }}
